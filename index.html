	<script src="https://unpkg.com/scrollreveal"></script>

	<script>
		// Capture ?pw= from shared links and persist in sessionStorage
		(function () {
			var pw = new URLSearchParams(window.location.search).get('pw');
			if (pw) { try { sessionStorage.setItem('portfolio_pw', pw); } catch(e) {} }
		})();

		window.addEventListener('DOMContentLoaded', function () {
			ScrollReveal({ distance: '35px', duration: '1000', easing: 'ease', mobile: 'true', viewFactor: 0 });
			ScrollReveal().reveal('header', { origin: 'top' });
			ScrollReveal().reveal('#welcome', { origin: 'bottom' });

			var req = new XMLHttpRequest();
			req.open('GET', '/works.json');
			req.responseType = 'json';
			req.send();
			req.onload = function () {
				var grid = document.getElementById('work-grid');
				var html = '';
				var storedPw = '';
				try { storedPw = sessionStorage.getItem('portfolio_pw') || ''; } catch(e) {}
				req.response.works.forEach(function (w) {
					var tagLabels = w.tags.filter(function (t) { return t !== 'Featured'; }).map(function (t) { return '<span class="work-tag">' + t + '</span>'; }).join('');
					var dataFilter = w.tags.map(function (t) { return t.toLowerCase(); }).join(' ');
					html +=
						'<a href="' + w.link + '" class="work-card" data-tags="' + dataFilter + '" data-research-order="' + (w.researchOrder || 99) + '" data-design-order="' + (w.designOrder || 99) + '" data-strategy-order="' + (w.strategyOrder || 99) + '" data-all-order="' + (w.allOrder || 99) + '" style="--card-color:' + w.color + '">' +
							'<div class="work-card-body">' +
								'<div class="work-card-meta">' + (w.date ? '<span class="work-card-date">' + w.date + '</span>' : '') + '<div class="work-card-tags">' + tagLabels + '</div></div>' +
								'<h3 class="work-card-title">' + w.title + '</h3>' +
								'<p class="work-card-desc">' + w.desc + '</p>' +
								'<span class="work-card-label">' + (w.password && !storedPw ? 'Enter password →' : 'Read case study →') + '</span>' +
							'</div>' +
							'<div class="work-card-img" style="background-image:url(' + w.img + ')"></div>' +
						'</a>';
				});
				grid.innerHTML = html;

				// Sort initial "all" view by allOrder
				var initialCards = Array.from(grid.querySelectorAll('.work-card'));
				initialCards.sort(function (a, b) {
					return parseInt(a.getAttribute('data-all-order')) - parseInt(b.getAttribute('data-all-order'));
				});
				initialCards.forEach(function (c) { grid.appendChild(c); });

				ScrollReveal().reveal('#filter-bar', { origin: 'bottom', distance: '20px', duration: 600, reset: false });
				ScrollReveal().reveal('.work-card', { origin: 'bottom', distance: '30px', duration: 800, interval: 150, reset: false });

				// Filter bar
				document.querySelectorAll('#filter-bar .filter-btn').forEach(function (btn) {
					btn.addEventListener('click', function () {
						document.querySelectorAll('#filter-bar .filter-btn').forEach(function (b) { b.classList.remove('active'); });
						btn.classList.add('active');
						var filter = btn.getAttribute('data-filter');
						var cards = document.querySelectorAll('#work-grid .work-card');

						// Step 1: fade out all visible cards
						cards.forEach(function (card) {
							card.classList.add('hiding');
						});

						// Step 2: after fade-out, show matching cards with stagger
						setTimeout(function () {
							// Hide all first
							cards.forEach(function (card) {
								card.style.display = 'none';
							});

							// Show matching cards with stagger (sorted if needed)
							var matched = [];
							cards.forEach(function (card) {
								var match = filter === 'all' || card.getAttribute('data-tags').indexOf(filter) !== -1;
								if (match) matched.push(card);
							});
							if (filter === 'all') {
								matched.sort(function (a, b) {
									return parseInt(a.getAttribute('data-all-order')) - parseInt(b.getAttribute('data-all-order'));
								});
								var grid = document.getElementById('work-grid');
								matched.forEach(function (c) { grid.appendChild(c); });
							}
							if (filter === 'research') {
								matched.sort(function (a, b) {
									return parseInt(a.getAttribute('data-research-order')) - parseInt(b.getAttribute('data-research-order'));
								});
								var grid = document.getElementById('work-grid');
								matched.forEach(function (c) { grid.appendChild(c); });
							}
							if (filter === 'design') {
								matched.sort(function (a, b) {
									return parseInt(a.getAttribute('data-design-order')) - parseInt(b.getAttribute('data-design-order'));
								});
								var grid = document.getElementById('work-grid');
								matched.forEach(function (c) { grid.appendChild(c); });
							}
							if (filter === 'strategy') {
								matched.sort(function (a, b) {
									return parseInt(a.getAttribute('data-strategy-order')) - parseInt(b.getAttribute('data-strategy-order'));
								});
								var grid = document.getElementById('work-grid');
								matched.forEach(function (c) { grid.appendChild(c); });
							}
							matched.forEach(function (card, i) {
								(function (c, delay) {
									c.style.transitionDelay = delay + 'ms';
									c.style.display = '';
									c.classList.add('hiding');
									c.offsetHeight;
									c.classList.remove('hiding');
								})(card, i * 80);
							});

							// Clean up delays
							setTimeout(function () {
								cards.forEach(function (c) { c.style.transitionDelay = ''; });
							}, i * 80 + 400);
						}, 250);
					});
				});
			};
		});
	</script>

	<script>
		window.addEventListener("load", function () {
			document.querySelectorAll('.work-grid a, footer a').forEach(function (item) {
