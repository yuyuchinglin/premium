	<script>
		var allArticles = [];
		var currentLang = 'en';
		var currentCat = 'all';

		function normalizeCategory(cat) {
			if (!cat) return 'Other';
			var c = cat.toLowerCase();
			if (c.includes('psychology') || c.includes('self compassion')) return 'Psychology';
			if (c.includes('ux') || c.includes('user experience')) return 'UX';
			if (c.includes('personal growth') || c.includes('reading')) return 'Personal Growth';
			if (c.includes('strategy')) return 'Strategy';
			if (c.includes('ai') || c.includes('productivity')) return 'AI';
			return 'Other';
		}

		var catOrder = { 'Psychology': 1, 'UX': 2, 'Personal Growth': 3, 'Strategy': 4, 'AI': 5, 'Other': 6 };

		function sortArticles(articles) {
			return articles.slice().sort(function (a, b) {
				var dateDiff = new Date(b.date) - new Date(a.date);
				if (dateDiff !== 0) return dateDiff;
				var catDiff = (catOrder[normalizeCategory(a.category)] || 9) - (catOrder[normalizeCategory(b.category)] || 9);
				if (catDiff !== 0) return catDiff;
				return (a.publication || '').localeCompare(b.publication || '');
			});
		}

		function renderArticles(articles) {
			var feed = document.getElementById('blog-feed');
			feed.innerHTML = '';
			if (articles.length === 0) {
				feed.innerHTML = '<p style="color:#999; padding: 40px 0;">No articles found.</p>';
				return;
			}
			articles.forEach(function (a) {
				var cat = normalizeCategory(a.category);
				feed.innerHTML += '<a class="blog-article-item" href="' + a.link + '" target="_blank" data-lang="' + a.lang + '" data-cat="' + cat + '">' +
					'<div class="blog-article-body">' +
						'<div class="blog-article-meta">' +
							'<span class="blog-cat-tag">' + cat + '</span>' +
							'<span class="blog-article-date">' + a.date + (a.publication ? ' · ' + a.publication : '') + '</span>' +
						'</div>' +
						'<h3 class="blog-article-title">' + a.title + '</h3>' +
						'<p class="blog-article-subtitle">' + a.subtitle + '</p>' +
						'<div class="blog-article-img" style="background-image: url(/blogs/articles/' + a.img + ')"></div>' +
						'<p class="blog-article-excerpt">' + (a.excerpt || '') + ' <span class="blog-read-more">Read more →</span></p>' +
					'</div>' +
				'</a>';
			});
			ScrollReveal().reveal('.blog-article-item', {
				origin: 'bottom',
				distance: '30px',
				duration: 800,
				interval: 100,
				reset: false,
			});
		}

		function filterArticles() {
			return sortArticles(allArticles.filter(function (a) {
				var langOk = currentLang === 'all' || a.lang === currentLang;
				var catOk = currentCat === 'all' || normalizeCategory(a.category) === currentCat;
				return langOk && catOk;
			}));
		}

		function updateCounts() {
			var langCounts = {};
			allArticles.forEach(function (a) { langCounts[a.lang] = (langCounts[a.lang] || 0) + 1; });
			document.querySelector('[data-filter="lang"][data-value="en"]').innerHTML = 'English <span class="btn-count">(' + (langCounts['en'] || 0) + ')</span>';
			document.querySelector('[data-filter="lang"][data-value="cn"]').innerHTML = '中文 <span class="btn-count">(' + (langCounts['cn'] || 0) + ')</span>';

			var langFiltered = allArticles.filter(function (a) {
				return currentLang === 'all' || a.lang === currentLang;
			});
			var catCounts = {};
			langFiltered.forEach(function (a) {
				var cat = normalizeCategory(a.category);
				catCounts[cat] = (catCounts[cat] || 0) + 1;
			});
			document.querySelector('[data-filter="cat"][data-value="all"]').innerHTML = 'All <span class="btn-count">(' + langFiltered.length + ')</span>';
			['Psychology', 'UX', 'Personal Growth', 'Strategy'].forEach(function (cat) {
				var btn = document.querySelector('[data-filter="cat"][data-value="' + cat + '"]');
				if (btn) btn.innerHTML = cat + ' <span class="btn-count">(' + (catCounts[cat] || 0) + ')</span>';
			});
		}

		const requestURL = './articles.json';
		var request = new XMLHttpRequest();
		request.open('GET', requestURL);
		request.responseType = 'json';
		request.send();
		request.onload = function () {
			var en = request.response.en_articles.map(function (a) { return Object.assign({}, a, { lang: 'en' }); });
			var cn = request.response.cn_articles.map(function (a) { return Object.assign({}, a, { lang: 'cn' }); });
			allArticles = en.concat(cn);
			renderArticles(filterArticles());
			updateCounts();
		};
	</script>

	<script>
		window.addEventListener("load", function () {
			document.querySelectorAll('.filter-btn').forEach(function (btn) {
				btn.addEventListener('click', function () {
					var filterType = btn.dataset.filter;
					var value = btn.dataset.value;
					document.querySelectorAll('[data-filter="' + filterType + '"]').forEach(function (b) { b.classList.remove('active'); });
					btn.classList.add('active');
					if (filterType === 'lang') currentLang = value;
					if (filterType === 'cat') currentCat = value;
					renderArticles(filterArticles());
					if (filterType === 'lang') updateCounts();
					window.scrollTo({ top: 0, behavior: 'smooth' });
				});
			});

			document.querySelectorAll('#article a, footer a').forEach(function (item) {
				item.addEventListener('click', function () {
					var title = item.querySelector('.blog-article-title');
					mixpanel.track('click ' + (title ? title.innerText : item.href));
				});
			});
		});
